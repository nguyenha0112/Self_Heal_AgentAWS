# NetworkPolicy — Local Trust: chỉ executor pod trong namespace "platform"
# được phép reach AI Engine tại self-heal-system:8080
# Tất cả ingress khác vào self-heal-system bị block

---
# Default deny all ingress vào self-heal-system
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: self-heal-system
spec:
  podSelector: {}
  policyTypes:
    - Ingress

---
# Allow: executor pod (namespace=platform, app=cdo-executor) → AI Engine port 8080
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-executor-to-ai
  namespace: self-heal-system
spec:
  podSelector:
    matchLabels:
      app: ai-engine
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: platform
          podSelector:
            matchLabels:
              app: cdo-executor
      ports:
        - protocol: TCP
          port: 8080
