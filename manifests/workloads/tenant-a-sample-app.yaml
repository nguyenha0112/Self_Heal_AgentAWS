apiVersion: apps/v1
kind: Deployment
metadata:
  name: cdo-sample-api
  namespace: tenant-a
  labels:
    app: cdo-sample-api
    tenant_id: tenant-a
    selfheal.ai/service: checkout-svc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cdo-sample-api
  template:
    metadata:
      labels:
        app: cdo-sample-api
        tenant_id: tenant-a
        selfheal.ai/service: checkout-svc
    spec:
      containers:
        - name: http-echo
          image: hashicorp/http-echo:1.0
          args:
            - "-text=CDO-02 tenant-a sample workload"
          ports:
            - containerPort: 5678
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: cdo-sample-api
  namespace: tenant-a
  labels:
    app: cdo-sample-api
    tenant_id: tenant-a
spec:
  selector:
    app: cdo-sample-api
  ports:
    - name: http
      port: 80
      targetPort: 5678
