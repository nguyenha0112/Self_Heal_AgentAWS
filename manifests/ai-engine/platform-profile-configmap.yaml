apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-engine-platform-profile
  namespace: self-heal-system
  labels:
    app: ai-engine
data:
  platform_profile_cdo.json: |
    {
      "profile_name": "cdo-self-heal-default",
      "system": "E-COMMERCE",
      "default_namespace": "tenant-a",
      "default_deployment_template": "deployment/{{target_service}}",
      "default_service": "checkout-svc",
      "allowed_namespaces": ["tenant-a", "tenant-b", "production", "default"],
      "services": ["checkout-svc", "orders-svc", "payment-gateway", "ecommerce-api", "ecommerce-web", "cdo-sample-api", "cdo-orders-api"],
      "metric_types": ["cpu", "mem", "delay", "loss", "socket", "disk", "f1", "f2", "f3", "f4", "f5"],
      "fault_runbook_mapping": {
        "cpu": "ScaleRecoveryRunbook",
        "mem": "MemoryRecoveryRunbook",
        "delay": "RestartRecoveryRunbook",
        "loss": "RestartRecoveryRunbook",
        "socket": "ScaleRecoveryRunbook",
        "disk": "RestartRecoveryRunbook",
        "f1": "RestartRecoveryRunbook",
        "f2": "RestartRecoveryRunbook",
        "f3": "RestartRecoveryRunbook",
        "f4": "RestartRecoveryRunbook",
        "f5": "RestartRecoveryRunbook"
      },
      "dependency_graph": {
        "checkout-svc": ["payment-gateway"],
        "orders-svc": ["payment-gateway"],
        "ecommerce-web": ["ecommerce-api"]
      },
      "runbooks": {
        "MemoryRecoveryRunbook": {
          "name": "MemoryRecoveryRunbook",
          "description": "Patch memory requests and limits.",
          "pattern_type": "urgent",
          "action_plan": [
            {
              "step": 1,
              "action": "PATCH_MEMORY_LIMIT",
              "target": "deployment/{{target_service}}",
              "params": {
                "namespace": "tenant-a",
                "container": "main",
                "memory_request_mb": 512,
                "memory_limit_mb": 1024
              }
            }
          ],
          "blast_radius_config": {
            "max_pod_impact_pct": 25,
            "circuit_breaker_error_rate": 0.2,
            "allowed_namespaces": ["tenant-a", "tenant-b"]
          },
          "verify_policy": {
            "window_seconds": 120,
            "success_conditions": ["pod_ready == true", "restart_count_no_increase == true"]
          }
        },
        "RestartRecoveryRunbook": {
          "name": "RestartRecoveryRunbook",
          "description": "Restart deployment for latency, loss, disk, or unknown faults.",
          "pattern_type": "urgent",
          "action_plan": [
            {
              "step": 1,
              "action": "RESTART_DEPLOYMENT",
              "target": "deployment/{{target_service}}",
              "params": {
                "namespace": "tenant-a",
                "grace_period_seconds": 30
              }
            }
          ],
          "blast_radius_config": {
            "max_pod_impact_pct": 25,
            "circuit_breaker_error_rate": 0.2,
            "allowed_namespaces": ["tenant-a", "tenant-b"]
          },
          "verify_policy": {
            "window_seconds": 120,
            "success_conditions": ["pod_ready == true"]
          }
        },
        "ScaleRecoveryRunbook": {
          "name": "ScaleRecoveryRunbook",
          "description": "Scale replicas for saturation symptoms.",
          "pattern_type": "deferred",
          "action_plan": [
            {
              "step": 1,
              "action": "SCALE_REPLICAS",
              "target": "deployment/{{target_service}}",
              "params": {
                "namespace": "tenant-a",
                "replicas": 3
              }
            }
          ],
          "blast_radius_config": {
            "max_pod_impact_pct": 25,
            "circuit_breaker_error_rate": 0.2,
            "allowed_namespaces": ["tenant-a", "tenant-b"]
          },
          "verify_policy": {
            "window_seconds": 120,
            "success_conditions": ["pod_ready == true"]
          }
        }
      }
    }
