apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ai-engine-ingress-from-executor
  namespace: self-heal-system
spec:
  podSelector:
    matchLabels:
      app: ai-engine
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: cdo-self-heal-controller
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 10.0.0.0/16
      ports:
        - protocol: TCP
          port: 443
